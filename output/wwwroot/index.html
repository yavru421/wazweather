<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShotStack Studio</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="icon-192.png" />
    <link href="BlazorPwaTemplate.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
</head>
<body>
    <div id="app">
        <div class="shotstack-loader">
            <div class="spinner"></div>
            <span>Mounting ShotStack Environment...</span>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled exception occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">✕</a>
    </div>

    <script src="_framework/blazor.webassembly.66stpp682q.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js');</script>
    <script src="js/editorInteractions.js"></script>
    
    <script>
        // High-speed blob transmission stream bypass framework
        window.shotStackSaver = {
            saveAndDownloadFile: function (filename, byteBase64) {
                const link = document.createElement('a');
                link.download = filename;
                link.href = 'data:application/pdf;base64,' + byteBase64;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        };
    </script>
</body>
</html>
