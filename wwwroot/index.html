<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShotStack Studio</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="icon-192.png" />
    <link href="BlazorPwaTemplate.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <script type="importmap"></script>
</head>
<body>
    <div id="app">
        <div class="shotstack-loader">
            <div class="spinner"></div>
            <span class="loading-text">Mounting ShotStack Environment...</span>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" style="width: var(--blazor-load-percentage, 0%)"></div>
            </div>
            <style>
                .progress-text::after {
                    content: var(--blazor-load-percentage-text, "0") "%";
                }
            </style>
            <span class="progress-text">Loading... </span>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled exception occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">✕</a>
    </div>

    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        navigator.serviceWorker.register('service-worker.js').then(registration => {
            registration.onupdatefound = () => {
                const installingWorker = registration.installing;
                if (installingWorker == null) {
                    return;
                }
                installingWorker.onstatechange = () => {
                    if (installingWorker.state === 'installed') {
                        if (navigator.serviceWorker.controller) {
                            // A new service worker has been installed and is ready to take over.
                            console.log('New or updated content is available. Please refresh the page to update.');
                        }
                    }
                };
            };
        });
    </script>
    <script src="js/editorInteractions.js"></script>
    
    <script>
        // High-speed blob transmission stream bypass framework
        window.shotStackSaver = {
            saveAndDownloadFile: function (filename, byteBase64) {
                // Convert base64 to byte array
                const byteCharacters = atob(byteBase64);
                const byteNumbers = new Array(byteCharacters.length);
                for (let i = 0; i < byteCharacters.length; i++) {
                    byteNumbers[i] = byteCharacters.charCodeAt(i);
                }
                const byteArray = new Uint8Array(byteNumbers);
                
                // Create Blob with appropriate MIME type
                const blob = new Blob([byteArray], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                
                // Trigger download
                const link = document.createElement('a');
                link.download = filename;
                link.href = url;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                // Clean up Blob URL
                setTimeout(() => URL.revokeObjectURL(url), 2000);
            }
        };
    </script>
</body>
</html>
